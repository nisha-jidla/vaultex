version: "3.9"

services:

  # ─── Prometheus — collects metrics ─────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vaultex-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - vaultex-net
    ports:
      - "9090:9090"

  # ─── Grafana — visualises metrics ──────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vaultex-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: vaultex123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - vaultex-net
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # ─── Node Exporter — host machine metrics ──────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: vaultex-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - vaultex-net
    ports:
      - "9100:9100"

  # ─── cAdvisor — Docker container metrics ───────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: vaultex-cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - vaultex-net
    ports:
      - "8080:8080"

volumes:
  prometheus-data:
  grafana-data:

networks:
  vaultex-net:
    external: true
    name: vaultex_vaultex-net


