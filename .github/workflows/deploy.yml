name: Vaultex CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Tests passed"

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check images
        run: docker images | grep vaultex || echo "No images yet"

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vaultex
          chmod 600 ~/.ssh/vaultex

      - name: Wait for EC2 to be ready
        run: sleep 30

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/vaultex -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            if [ ! -d /home/ubuntu/vaultex ]; then
              git clone https://github.com/nisha-jidla/vaultex.git /home/ubuntu/vaultex
            fi
            cd /home/ubuntu/vaultex
            git pull origin main
            sudo docker-compose up -d --build
            echo "Vaultex deployed successfully!"
          ENDSSH

      - name: Notify success
        run: echo "Vaultex deployed to http://${{ secrets.EC2_HOST }}"