name: Vaultex CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Tests passed"

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check images
        run: docker images | grep vaultex || echo "No images yet"

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vaultex
          chmod 600 ~/.ssh/vaultex
          ssh-keyscan -t rsa -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Wait for EC2 to be ready
        run: sleep 30

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no  \
              -i ~/.ssh/vaultex \
              ubuntu@${{ secrets.EC2_HOST }} \
              "cd /home/ubuntu/vaultex && git pull && sudo docker-compose up -d"

      - name: Notify success
        run: echo "Vaultex deployed to http://${{ secrets.EC2_HOST }}"