name: Vaultex CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1

jobs:

  # ─── JOB 1: Test all services ──────────────────────────────
  test:
    name: Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test User Service
        working-directory: services/user-service
        run: |
          npm install
          echo "✅ User Service dependencies installed"

      - name: Test Seller Service
        working-directory: services/seller-service
        run: |
          npm install
          echo "✅ Seller Service dependencies installed"

      - name: Test Cart Service
        working-directory: services/cart-service
        run: |
          npm install
          echo "✅ Cart Service dependencies installed"

      - name: Test Payment Service
        working-directory: services/payment-service
        run: |
          npm install
          echo "✅ Payment Service dependencies installed"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test Product Service
        working-directory: services/product-service
        run: |
          pip install -r requirements.txt
          echo "✅ Product Service dependencies installed"

      - name: Test Order Service
        working-directory: services/order-service
        run: |
          pip install -r requirements.txt
          echo "✅ Order Service dependencies installed"

  # ─── JOB 2: Build Docker images ────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test  # Only runs if test job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: |
          docker compose build --parallel
          echo "✅ All Docker images built successfully"

      - name: Check images
        run: docker images | grep vaultex

  # ─── JOB 3: Deploy to AWS EC2 ──────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build  # Only runs if build job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/vaultex
          chmod 600 ~/.ssh/vaultex
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/vaultex ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd /home/ubuntu/vaultex
            git pull origin main
            sudo docker-compose up -d --build
            echo "✅ Vaultex deployed successfully!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 30
          curl -f http://${{ secrets.EC2_HOST }}/api/users/health || echo "Health check failed"

      - name: Notify success
        run: |
          echo "🚀 Vaultex deployed to http://${{ secrets.EC2_HOST }}"
