name: Health Check

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Can also run manually

jobs:
  health:
    name: Check Vaultex Health
    runs-on: ubuntu-latest

    steps:
      - name: Check all services
        run: |
          BASE_URL="http://${{ secrets.EC2_HOST }}"

          check_service() {
            local name=$1
            local url=$2
            if curl -sf "$url" > /dev/null 2>&1; then
              echo "✅ $name is healthy"
            else
              echo "❌ $name is DOWN!"
            fi
          }

          check_service "User Service"    "$BASE_URL/api/users/health"
          check_service "Seller Service"  "$BASE_URL/api/sellers/health"
          check_service "Product Service" "$BASE_URL/api/products/health"
          check_service "Cart Service"    "$BASE_URL/api/cart/health"
          check_service "Order Service"   "$BASE_URL/api/orders/health"
          check_service "Payment Service" "$BASE_URL/api/payments/health"
          check_service "Frontend"        "$BASE_URL"
