events {
  worker_connections 1024;
}

http {

  upstream user_service      { server user-service:3001; }
  upstream seller_service    { server seller-service:3002; }
  upstream product_service   { server product-service:8001; }
  upstream cart_service      { server cart-service:3003; }
  upstream order_service     { server order-service:8002; }
  upstream payment_service   { server payment-service:3004; }
  upstream notification_svc  { server notification-service:3005; }
  upstream frontend          { server frontend:80; }

  server {
    listen 80;
    server_name _;

    # ── API Routes ──────────────────────────────────────────

    location /api/users/ {
      proxy_pass http://user_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/sellers/ {
      proxy_pass http://seller_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products/ {
      proxy_pass http://product_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cart/ {
      proxy_pass http://cart_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/orders/ {
      proxy_pass http://order_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payments/ {
      proxy_pass http://payment_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── WebSocket for Notifications ─────────────────────────

    location /ws/ {
      proxy_pass http://notification_svc/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # ── Frontend (catch-all) ────────────────────────────────

    location / {
      proxy_pass http://frontend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
